<!-- 전체 화면(가로)-->

        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

      <!--회의 목록-->

        <span class="flex items-center gap-3">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

      <!--문서 관리-->

        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

      <!--구성원 관리-->

        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>

    </nav>

  <!--오른쪽 메인 영역-->
  <div class="flex-1 flex flex-col overflow-hidden bg-white">

    <!-- 상단 헤더-->
    <header class="flex items-center justify-end gap-3 px-6 py-3 border-b border-gray-200 bg-white shrink-0">
      <!--알림 아이콘 -->
      <button class="relative p-2 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <!--알림 빨간점-->
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
      </button>

      <!--유저 드롭다운-->
      <button class="flex items-center gap-2 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition">
        <div class="w-7 h-7 rounded-full bg-violet-600 flex items-center justify-center text-white text-xs font-bold">김</div>
        <span class="font-medium">김지원</span>
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
    </header>

    <!--스크롤 가능한 본문-->
    <main class="flex-1 overflow-y-auto px-8 py-6">

      <!--페이지 제목/설명-->
      <h1 class="text-2xl font-bold text-gray-900 mb-1">회의 목록</h1>
      <p class="text-sm text-gray-500 mb-5">회의를 등록하고 관리할 수 있습니다.</p>

      <!--검색 입력창-->
      <div class="relative mb-3">
        <input
          id="searchInput"
          type="text"
          placeholder="회의 명이나 생성자를 입력해주세요"
          oninput="onSearch()"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-10 text-sm outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-200 transition"
        />
        <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </div>

      <!--필터 행(상태 / 기간 / 날짜 / 삭제)-->
      <div class="flex flex-wrap items-center gap-2 mb-4">

        <!--상태 필터-->
        <div class="flex items-center gap-1.5">
          <label class="text-sm text-gray-600 font-medium whitespace-nowrap">상태</label>
          <select id="statusFilter" onchange="onFilter()"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-violet-500 cursor-pointer">
            <option value="">전체</option>
            <option value="scheduled">예정</option>
            <option value="in_progress">진행 중</option>
            <option value="finished">종료</option>
          </select>
        </div>

        <!--기간 필터-->
        <div class="flex items-center gap-1.5">
          <label class="text-sm text-gray-600 font-medium whitespace-nowrap">기간</label>
          <select id="periodFilter" onchange="onFilter()"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-violet-500 cursor-pointer">
            <option value="">전체</option>
            <option value="1w">1주일</option>
            <option value="1m">1개월</option>
            <option value="3m">3개월</option>
            <option value="3m">6개월</option>
            <option value="3m">1년</option>
          </select>
        </div>

        <!--날짜 범위-->
        <div class="flex items-center gap-1.5">
          <input id="dateFrom" type="date" onchange="onFilter()"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-violet-500 cursor-pointer" />
          <span class="text-gray-400 text-sm">~</span>
          <input id="dateTo" type="date" onchange="onFilter()"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 outline-none focus:border-violet-500 cursor-pointer" />
        </div>

        <!--삭제 버튼-->
        <button onclick="deleteSelected()"
          class="ml-auto border border-gray-300 text-gray-600 hover:bg-red-50 hover:border-red-300 hover:text-red-600 px-4 py-2 rounded-lg text-sm font-medium transition">
          삭제
        </button>
      </div>

      <!--테이블 래퍼-->
      <div class="overflow-x-auto rounded-lg border border-gray-200">
        <table class="w-full text-sm min-w-[860px]">

          <!--테이블 헤더-->
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-4 py-3 w-10">
                <input type="checkbox" id="checkAll" onclick="toggleAll(this)" />
              </th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">회의명</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">회의 장소</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">상태</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">생성자</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">날짜</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">참여자</th>
              <th class="px-4 py-3 text-left text-gray-600 font-semibold">이메일 발송</th>
            </tr>
          </thead>

          <!--테이블 바디-->
          <tbody id="tableBody" class="divide-y divide-gray-100 bg-white"></tbody>

        </table>

        <!--결과X-->
        <div id="emptyMsg" class="hidden py-16 text-center text-sm text-gray-400 bg-white">
          검색 결과가 없습니다.
        </div>
      </div>

      <!--페이지네이션 -->
      <div id="pagination" class="flex justify-center gap-1 mt-5"></div>

    </main>
  </div>
</div>

<!-- 삭제 확인 모달-->
<div
  id="deleteModal"
  class="fixed inset-0 hidden items-center justify-center bg-black/50 z-50"
>
  <div class="w-[508px] bg-white rounded-[20px] overflow-hidden shadow-xl">
    
    <div class="px-8 py-12 text-center">
      <p class="text-[20px] leading-[1.7] font-medium text-[#623FB5]">
        해당 회의를 삭제하시겠습니까?<br />
        확인 버튼을 누를 경우<br />
        해당 회의는 복구할 수 없습니다.
      </p>
    </div>

    <div class="grid grid-cols-2 border-t border-gray-200">
      <button
        type="button"
        onclick="closeDeleteModal()"
        class="py-5 text-[15px] font-semibold text-gray-900 hover:bg-gray-50 border-r border-gray-200"
      >
        취소
      </button>

      <button
        type="button"
        onclick="confirmDelete()"
        class="py-5 text-[15px] font-semibold text-gray-900 hover:bg-gray-50"
      >
        확인
      </button>
    </div>

  </div>
</div>

<!-- JavaScript                                 -->
<script>
//더미 데이터
const MEETINGS = [
  { id:1,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"scheduled",   creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호","최예진","한승우"] },
  { id:2,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"in_progress", creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호","최예진"] },
  { id:3,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호"] },
  { id:4,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영"] },
  { id:5,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호"] },
  { id:6,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호","최예진"] },
  { id:7,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영"] },
  { id:8,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호"] },
  { id:9,  title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영"] },
  { id:10, title:"AI 매칭 엔진 스프린트 리뷰",         place:"대림 테크노파크 9층 2호 2039 17층", status:"finished",    creator:"김지원", date:"2026-06-10 09:00", participants:["김지원","류지나","박수영","이민호"] },
  { id:11, title:"UI/UX 개선안 디자인 리뷰 회의",       place:"본사 3층 대회의실",                status:"scheduled",   creator:"류지나", date:"2026-06-12 14:00", participants:["류지나","박수영","이민호"] },
  { id:12, title:"백엔드 API 스펙 확정 회의",           place:"화상회의 (Google Meet)",           status:"in_progress", creator:"박수영", date:"2026-06-13 11:00", participants:["박수영","이민호","최예진","한승우"] },
  { id:13, title:"스프린트 4 계획 및 회고",             place:"본사 2층 소회의실",                status:"scheduled",   creator:"이민호", date:"2026-06-18 15:00", participants:["이민호","최예진","한승우","김지원"] },
  { id:14, title:"고객사 요구사항 분석 2차 미팅",       place:"고객사 회의실",                    status:"finished",    creator:"최예진", date:"2026-06-05 10:30", participants:["최예진","한승우","류지나"] },
  { id:15, title:"인프라 비용 최적화 검토",             place:"화상회의 (Zoom)",                  status:"finished",    creator:"한승우", date:"2026-06-08 16:00", participants:["한승우","김지원","박수영","류지나","이민호"] },
];

const STATUS_MAP = {
  scheduled:   { label:"예정",   cls:"badge-scheduled" },
  in_progress: { label:"진행 중", cls:"badge-inprogress" },
  finished:    { label:"종료",   cls:"badge-finished" },
};
const PER_PAGE = 10;

let page   = 1;
let search = "";
let status = "";

//필터링
function getFiltered() {
  const q = search.trim().toLowerCase();
  return MEETINGS.filter(m => {
    const matchQ = !q || m.title.toLowerCase().includes(q) || m.creator.toLowerCase().includes(q);
    const matchS = !status || m.status === status;
    return matchQ && matchS;
  });
}

//이벤트
function onSearch() { search = document.getElementById("searchInput").value; page = 1; render(); }
function onFilter() { status = document.getElementById("statusFilter").value; page = 1; render(); }
function goPage(p) {
  const total = Math.max(1, Math.ceil(getFiltered().length / PER_PAGE));
  if (p < 1 || p > total) return;
  page = p;
  render();
  document.querySelector("main").scrollTo({ top: 0, behavior: "smooth" });
}

//체크박스 전체 선택
function toggleAll(master) {
  document.querySelectorAll(".row-check").forEach(cb => cb.checked = master.checked);
}
let deleteTargetCount = 0;

function deleteSelected() {
  const checked = document.querySelectorAll(".row-check:checked");
  if (checked.length === 0) {
    alert("삭제할 항목을 선택해주세요.");
    return;
  }

  deleteTargetCount = checked.length;
  openDeleteModal();
}
function openDeleteModal() {
  const modal = document.getElementById("deleteModal");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function closeDeleteModal() {
  const modal = document.getElementById("deleteModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

function confirmDelete() {
  alert(`${deleteTargetCount}개 항목이 삭제되었습니다. (더미 동작)`);
  closeDeleteModal();
}

//참여자
function participantCell(list) {
  const shown = list.slice(0, 3).join(", ");
  const extra = list.length - 3;
  return extra > 0 ? `${shown} <span class="text-gray-400">+${extra}명</span>` : shown;
}

//렌더링
function render() {
  const list   = getFiltered();
  const total  = Math.max(1, Math.ceil(list.length / PER_PAGE));
  if (page > total) page = total;
  const paged  = list.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  const isEmpty = list.length === 0;

  //테이블 바디
  document.getElementById("tableBody").innerHTML = paged.map(m => {
    const s = STATUS_MAP[m.status] ?? STATUS_MAP.finished;
    return `
    <tr class="cursor-pointer">
      <td class="px-4 py-3 text-center">
        <input type="checkbox" class="row-check" />
      </td>
      <td class="px-4 py-3 font-medium text-gray-900">
        ${m.title}
        <svg class="inline w-3.5 h-3.5 ml-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </td>
      <td class="px-4 py-3 text-gray-500 truncate max-w-[180px]">${m.place}</td>
      <td class="px-4 py-3">
        <span class="badge ${s.cls}">${s.label}</span>
      </td>
      <td class="px-4 py-3 text-gray-700">${m.creator}</td>
      <td class="px-4 py-3 text-gray-700 whitespace-nowrap">${m.date}</td>
      <td class="px-4 py-3 text-gray-700 text-sm">${participantCell(m.participants)}</td>
      <td class="px-4 py-3">
        <button class="btn-email" onclick="event.stopPropagation(); alert('이메일 발송: ${m.title}')">
          이메일 발송
        </button>
      </td>
    </tr>`;
  }).join("");

  // 빈 상태
  document.getElementById("emptyMsg").classList.toggle("hidden", !isEmpty);

  //전체 선택 체크박스 초기화
  const checkAll = document.getElementById("checkAll");
  if (checkAll) checkAll.checked = false;

  //페이지네이션
  renderPagination(total);
}

function renderPagination(total) {
  const el = document.getElementById("pagination");
  if (total <= 1) { el.innerHTML = ""; return; }

  let html = `<button onclick="goPage(${page-1})" ${page===1?"disabled":""} class="page-btn">‹</button>`;
  for (let p = 1; p <= total; p++) {
    html += `<button onclick="goPage(${p})" class="page-btn ${p===page?"page-btn-active":""}">${p}</button>`;
  }
  html += `<button onclick="goPage(${page+1})" ${page===total?"disabled":""} class="page-btn">›</button>`;
  el.innerHTML = html;
}

// 초기 렌더
document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
