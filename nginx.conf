# ================================================================
# nginx.conf
# 역할: 사용자 요청을 받아서 적절한 곳으로 분기하는 설정 파일
#       "/api/로 시작하면 backend로, 아니면 React 파일 돌려줌"
# ================================================================

server {
    listen 80;
    server_name hpm-meeting.site;
    # http로 오면 https로 리다이렉트
    return 301 https://$host$request_uri;
}

server {
    # 80번 포트로 들어오는 요청을 처리
    listen 443 ssl;
    server_name hpm-meeting.site;

    # SSL 인증서 경로
    ssl_certificate /etc/letsencrypt/live/hpm-meeting.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpm-meeting.site/privkey.pem;

    # ── React 파일 서빙 ──────────────────────────────────────
    # /api/로 시작하지 않는 모든 요청
    # ex) http://localhost/meeting/create
    location / {
        # 빌드된 React 파일이 있는 폴더
        root /usr/share/nginx/html;
        index index.html;

        # React Router 새로고침 대응
        # 새로고침해도 index.html을 돌려줘서 React가 라우팅 처리하게 함
        # 이게 없으면 새로고침 시 404 에러 발생
        try_files $uri $uri/ /index.html;
    }

    # ── backend로 전달 ────────────────────────────────────────
    # /api/로 시작하는 모든 요청
    # ex) http://localhost/api/meetings/
    # 사용자 주소는 바뀌지 않지만 내부적으로 backend 8000번으로 전달
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 업로드 파일 전달 ──────────────────────────────────────
    # /media/로 시작하는 요청 (녹음파일, 업로드 문서 등)
    # ex) http://localhost/media/records/1/audio.webm
    location /media/ {
        proxy_pass http://backend:8000;
    }
}
